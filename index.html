<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キレートレモン輸出ダッシュ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* スタート画面 */
        .start-screen {
            text-align: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 5px solid #FFD700;
        }
        .start-screen.hidden {
            display: none;
        }
        .title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #FF6B00;
            text-shadow: 4px 4px 0 #FFD700;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .mission-box {
            background: #FFF9C4;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #FFD700;
        }
        .mission-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #FF6B00;
            margin-bottom: 15px;
        }
        .mission-item {
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: left;
        }
        .icon-large {
            font-size: 2rem;
            margin: 0 10px;
        }
        .controls-info {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #00D9FF;
        }
        .control-row {
            font-size: 1.3rem;
            margin: 10px 0;
            font-weight: 700;
        }
        .key {
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 900;
            margin: 0 5px;
            display: inline-block;
            min-width: 50px;
            text-align: center;
        }
        .start-btn {
            background: linear-gradient(135deg, #FFD700, #FF6B00);
            border: none;
            padding: 20px 60px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            margin-top: 20px;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }

        /* ゲーム画面 */
        .game-container {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .game-container.active {
            display: block;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 3px solid #FFD700;
        }
        .timer {
            color: #FF6B00;
        }
        .timer.warning {
            animation: warningPulse 0.5s infinite;
            background: #FFEBEE;
        }
        @keyframes warningPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .progress {
            color: #333;
        }
        .check {
            color: #4CAF50;
        }
        .uncheck {
            color: #BDBDBD;
        }

        /* ゲームキャンバス */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 70px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 1000;
            border: 5px solid #FFD700;
        }
        .result-screen.active {
            display: block;
            animation: popIn 0.5s;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .result-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .success { color: #4CAF50; }
        .failed { color: #FF4444; }
        .result-emoji {
            font-size: 5rem;
            margin: 20px 0;
        }
        .result-stats {
            font-size: 1.3rem;
            margin: 15px 0;
            color: #666;
        }
        .result-time {
            font-size: 2.5rem;
            font-weight: 900;
            color: #FF6B00;
            margin: 20px 0;
        }

        /* メッセージ */
        .message {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 200;
            animation: messageFloat 2s ease-out forwards;
            border: 3px solid #FFD700;
        }
        @keyframes messageFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
        }

        /* 説明オーバーレイ */
        .overlay-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            z-index: 150;
            animation: fadeInOut 3s ease-out forwards;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- スタート画面 -->
    <div class="start-screen" id="startScreen">
        <div class="title">🍋 キレートレモン<br>輸出ダッシュ</div>
        <div class="subtitle">
            研究所と国際事業部を繋いで<br>
            キレートレモンを世界へ輸出せよ！
        </div>
        
        <div class="mission-box">
            <div class="mission-title">📋 ミッション</div>
            <div class="mission-item">1️⃣ <span class="icon-large">🔬</span>研究所に立ち寄る</div>
            <div class="mission-item">2️⃣ <span class="icon-large">🌍</span>国際事業部に立ち寄る</div>
            <div class="mission-item">3️⃣ <span class="icon-large">🍋</span>レモンを集める</div>
            <div class="mission-item">4️⃣ <span class="icon-large">🚢</span>輸出港でゴール！</div>
        </div>

        <div class="controls-info">
            <div class="control-row">
                <span class="key">←</span>
                <span class="key">→</span>
                移動
            </div>
            <div class="control-row">
                <span class="key">スペース</span>
                ジャンプ
            </div>
        </div>
        
        <button class="start-btn" onclick="startGame()">🍋 ゲーム開始！</button>
    </div>

    <!-- ゲーム画面 -->
    <div class="game-container" id="gameContainer">
        <div class="hud">
            <div class="hud-item timer" id="timerDisplay">⏱️ <span id="timer">40</span>秒</div>
            <div class="hud-item progress">
                <span id="researchCheck" class="uncheck">🔬</span>
                <span id="intlCheck" class="uncheck">🌍</span>
                <span>🍋 <span id="lemonCount">0</span>/8</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 結果画面 -->
    <div class="result-screen" id="resultScreen">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-time" id="resultTime"></div>
        <div class="result-stats" id="resultStats"></div>
        <br>
        <button class="start-btn" onclick="restart()">もう一度！</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ゲーム状態
        const game = {
            running: false,
            time: 40,
            cameraX: 0,
            worldWidth: 4000,
            keys: {},
            gravity: 0.6,
            groundY: canvas.height - 80,
            visitedResearch: false,
            visitedInternational: false,
            lemonsCollected: 0,
            totalLemons: 8
        };

        // プレイヤー
        const player = {
            x: 100,
            y: game.groundY - 50,
            width: 40,
            height: 50,
            velocityX: 0,
            velocityY: 0,
            speed: 6,
            jumpPower: -14,
            onGround: true,
            emoji: '🚚',
            facingRight: true
        };

        // チェックポイント
        const checkpoints = {
            research: {
                x: 500,
                y: game.groundY - 200,
                width: 100,
                height: 100,
                emoji: '🔬',
                name: '研究所',
                visited: false
            },
            international: {
                x: 2500,
                y: game.groundY - 200,
                width: 100,
                height: 100,
                emoji: '🌍',
                name: '国際事業部',
                visited: false
            }
        };

        // レモン
        const lemons = [];
        
        // プラットフォーム
        const platforms = [];

        // パーティクル
        const particles = [];

        // レベル生成
        function generateLevel() {
            lemons.length = 0;
            platforms.length = 0;

            // プラットフォーム
            platforms.push(
                { x: 300, y: game.groundY - 100, width: 120, height: 20 },
                { x: 450, y: game.groundY - 200, width: 150, height: 20 }, // 研究所の足場
                { x: 700, y: game.groundY - 150, width: 100, height: 20 },
                { x: 900, y: game.groundY - 200, width: 120, height: 20 },
                { x: 1100, y: game.groundY - 120, width: 100, height: 20 },
                { x: 1300, y: game.groundY - 180, width: 120, height: 20 },
                { x: 1550, y: game.groundY - 140, width: 100, height: 20 },
                { x: 1800, y: game.groundY - 200, width: 120, height: 20 },
                { x: 2050, y: game.groundY - 160, width: 100, height: 20 },
                { x: 2400, y: game.groundY - 200, width: 150, height: 20 }, // 国際事業部の足場
                { x: 2700, y: game.groundY - 140, width: 100, height: 20 },
                { x: 2950, y: game.groundY - 180, width: 120, height: 20 },
                { x: 3200, y: game.groundY - 150, width: 100, height: 20 }
            );

            // レモン配置
            const lemonPositions = [
                { x: 350, y: game.groundY - 130 },
                { x: 750, y: game.groundY - 180 },
                { x: 950, y: game.groundY - 230 },
                { x: 1350, y: game.groundY - 210 },
                { x: 1600, y: game.groundY - 170 },
                { x: 1850, y: game.groundY - 230 },
                { x: 2100, y: game.groundY - 190 },
                { x: 2750, y: game.groundY - 170 }
            ];

            lemonPositions.forEach(pos => {
                lemons.push({
                    x: pos.x,
                    y: pos.y,
                    size: 25,
                    collected: false,
                    rotation: 0,
                    floatOffset: Math.random() * Math.PI * 2
                });
            });

            // ゴール位置
            game.goalX = 3500;
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            
            game.running = true;
            game.time = 40;
            game.cameraX = 0;
            game.visitedResearch = false;
            game.visitedInternational = false;
            game.lemonsCollected = 0;
            
            player.x = 100;
            player.y = game.groundY - player.height;
            player.velocityX = 0;
            player.velocityY = 0;
            
            checkpoints.research.visited = false;
            checkpoints.international.visited = false;
            
            generateLevel();
            startTimer();
            showHint('矢印キーで移動、スペースでジャンプ！');
            gameLoop();
        }

        // タイマー
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!game.running) {
                    clearInterval(timerInterval);
                    return;
                }
                game.time--;
                document.getElementById('timer').textContent = game.time;
                
                const timerDisplay = document.getElementById('timerDisplay');
                if (game.time <= 10) {
                    timerDisplay.classList.add('warning');
                }
                
                if (game.time <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        // キー入力
        document.addEventListener('keydown', (e) => {
            game.keys[e.key] = true;
            
            if ((e.key === ' ' || e.key === 'Spacebar') && player.onGround) {
                player.velocityY = player.jumpPower;
                player.onGround = false;
            }
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // プレイヤー更新
        function updatePlayer() {
            // 横移動
            if (game.keys['ArrowLeft']) {
                player.velocityX = -player.speed;
                player.facingRight = false;
            } else if (game.keys['ArrowRight']) {
                player.velocityX = player.speed;
                player.facingRight = true;
            } else {
                player.velocityX *= 0.8;
            }

            // 重力
            player.velocityY += game.gravity;

            // 位置更新
            player.x += player.velocityX;
            player.y += player.velocityY;

            // 地面判定
            if (player.y >= game.groundY - player.height) {
                player.y = game.groundY - player.height;
                player.velocityY = 0;
                player.onGround = true;
            }

            // プラットフォーム判定
            player.onGround = false;
            platforms.forEach(platform => {
                if (player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height + 10 &&
                    player.velocityY >= 0) {
                    player.y = platform.y - player.height;
                    player.velocityY = 0;
                    player.onGround = true;
                }
            });

            // 地面判定再確認
            if (player.y >= game.groundY - player.height) {
                player.y = game.groundY - player.height;
                player.velocityY = 0;
                player.onGround = true;
            }

            // 画面端制限
            player.x = Math.max(0, Math.min(game.worldWidth - player.width, player.x));
        }

        // チェックポイント判定
        function checkCheckpoints() {
            Object.entries(checkpoints).forEach(([key, checkpoint]) => {
                if (checkpoint.visited) return;

                if (player.x + player.width > checkpoint.x &&
                    player.x < checkpoint.x + checkpoint.width &&
                    player.y + player.height > checkpoint.y &&
                    player.y < checkpoint.y + checkpoint.height) {
                    
                    checkpoint.visited = true;
                    
                    if (key === 'research') {
                        game.visitedResearch = true;
                        document.getElementById('researchCheck').className = 'check';
                        showMessage('🔬 研究所クリア！');
                    } else if (key === 'international') {
                        game.visitedInternational = true;
                        document.getElementById('intlCheck').className = 'check';
                        showMessage('🌍 国際事業部クリア！');
                    }
                    
                    createParticles(checkpoint.x + 50, checkpoint.y + 50, checkpoint.emoji, 15);
                }
            });
        }

        // レモン収集
        function checkLemons() {
            lemons.forEach(lemon => {
                if (lemon.collected) return;
                
                const dx = (player.x + player.width / 2) - lemon.x;
                const dy = (player.y + player.height / 2) - lemon.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < lemon.size + 20) {
                    lemon.collected = true;
                    game.lemonsCollected++;
                    document.getElementById('lemonCount').textContent = game.lemonsCollected;
                    createParticles(lemon.x, lemon.y, '🍋', 8);
                }
            });
        }

        // ゴール判定
        function checkGoal() {
            if (!game.visitedResearch || !game.visitedInternational || 
                game.lemonsCollected < game.totalLemons) return;
            
            if (player.x >= game.goalX && player.x <= game.goalX + 150) {
                endGame(true);
            }
        }

        // パーティクル
        function createParticles(x, y, emoji, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 4,
                    life: 40,
                    emoji: emoji,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.3
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.4;
                p.rotation += p.rotationSpeed;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // メッセージ
        function showMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        function showHint(text) {
            const hint = document.createElement('div');
            hint.className = 'overlay-hint';
            hint.textContent = text;
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 3000);
        }

        // カメラ
        function updateCamera() {
            const targetX = player.x - canvas.width / 3;
            game.cameraX += (targetX - game.cameraX) * 0.1;
            game.cameraX = Math.max(0, Math.min(game.worldWidth - canvas.width, game.cameraX));
        }

        // 描画
        function draw() {
            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.7, '#E0F6FF');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 雲
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            for (let i = 0; i < 8; i++) {
                const x = (i * 500 - game.cameraX * 0.3) % (canvas.width + 200) - 100;
                const y = 80 + (i % 3) * 60;
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.arc(x + 25, y, 40, 0, Math.PI * 2);
                ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(-game.cameraX, 0);

            // 地面
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, game.groundY, game.worldWidth, canvas.height - game.groundY);
            ctx.fillStyle = '#7CB342';
            ctx.fillRect(0, game.groundY - 10, game.worldWidth, 10);

            // プラットフォーム
            platforms.forEach(platform => {
                ctx.fillStyle = '#6D4C41';
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                ctx.fillStyle = '#7CB342';
                ctx.fillRect(platform.x, platform.y - 8, platform.width, 8);
            });

            // チェックポイント
            Object.values(checkpoints).forEach(checkpoint => {
                // 建物
                ctx.fillStyle = checkpoint.visited ? '#4CAF50' : '#FFD700';
                ctx.fillRect(checkpoint.x, checkpoint.y, checkpoint.width, checkpoint.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(checkpoint.x + 10, checkpoint.y + 10, 30, 30);
                ctx.fillRect(checkpoint.x + 60, checkpoint.y + 10, 30, 30);
                
                // アイコン
                ctx.font = '60px Arial';
                ctx.fillText(checkpoint.emoji, checkpoint.x + 20, checkpoint.y + 75);
                
                // 名前
                ctx.fillStyle = '#333';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(checkpoint.name, checkpoint.x + 50, checkpoint.y - 10);
                ctx.textAlign = 'left';
            });

            // レモン
            lemons.forEach(lemon => {
                if (lemon.collected) return;
                
                lemon.rotation += 0.05;
                lemon.floatOffset += 0.1;
                const floatY = Math.sin(lemon.floatOffset) * 10;
                
                ctx.save();
                ctx.translate(lemon.x, lemon.y + floatY);
                ctx.rotate(lemon.rotation);
                ctx.font = `${lemon.size * 2}px Arial`;
                ctx.fillText('🍋', -lemon.size, lemon.size);
                ctx.restore();
            });

            // ゴール
            const canGoal = game.visitedResearch && game.visitedInternational && 
                           game.lemonsCollected >= game.totalLemons;
            
            if (canGoal) {
                // 輸出港
                ctx.fillStyle = '#2196F3';
                ctx.fillRect(game.goalX, game.groundY - 200, 150, 200);
                ctx.fillStyle = '#1976D2';
                ctx.fillRect(game.goalX + 20, game.groundY - 180, 40, 40);
                ctx.fillRect(game.goalX + 90, game.groundY - 180, 40, 40);
                
                ctx.font = '80px Arial';
                ctx.fillText('🚢', game.goalX + 35, game.groundY - 80);
                
                ctx.fillStyle = '#FF6B00';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('輸出港', game.goalX + 75, game.groundY - 210);
                ctx.fillText('GOAL!', game.goalX + 75, game.groundY - 185);
                ctx.textAlign = 'left';
            }

            // プレイヤー
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width / 2, game.groundY + 3, player.width / 2, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);
            ctx.font = '50px Arial';
            ctx.fillText(player.emoji, -25, 20);
            ctx.restore();

            // パーティクル
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life / 40;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.font = '24px Arial';
                ctx.fillText(p.emoji, -12, 12);
                ctx.restore();
            });
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        // ゲームループ
        function gameLoop() {
            if (!game.running) return;

            updatePlayer();
            checkCheckpoints();
            checkLemons();
            checkGoal();
            updateParticles();
            updateCamera();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // ゲーム終了
        function endGame(success) {
            game.running = false;
            
            const resultScreen = document.getElementById('resultScreen');
            const resultTitle = document.getElementById('resultTitle');
            const resultEmoji = document.getElementById('resultEmoji');
            const resultTime = document.getElementById('resultTime');
            const resultStats = document.getElementById('resultStats');
            
            if (success) {
                resultTitle.textContent = '輸出成功！';
                resultTitle.className = 'result-title success';
                resultEmoji.textContent = '🎉🚢🍋';
                resultTime.textContent = `クリアタイム: ${40 - game.time}秒`;
                resultStats.innerHTML = `
                    ✅ 研究所訪問<br>
                    ✅ 国際事業部訪問<br>
                    ✅ レモン ${game.lemonsCollected}個収集
                `;
            } else {
                resultTitle.textContent = '時間切れ';
                resultTitle.className = 'result-title failed';
                resultEmoji.textContent = '⏰';
                resultTime.textContent = `あと少しでした！`;
                resultStats.innerHTML = `
                    ${game.visitedResearch ? '✅' : '❌'} 研究所訪問<br>
                    ${game.visitedInternational ? '✅' : '❌'} 国際事業部訪問<br>
                    🍋 レモン ${game.lemonsCollected}/${game.totalLemons}個
                `;
            }
            
            resultScreen.classList.add('active');
        }

        // リスタート
        function restart() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        // リサイズ
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            game.groundY = canvas.height - 80;
        });
    </script>
</body>
</html>
