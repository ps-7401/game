<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キレートレモン輸出ダッシュ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* スタート画面 */
        .start-screen {
            text-align: center;
            z-index: 1000;
        }
        .start-screen.hidden {
            display: none;
        }
        .title {
            font-size: 4rem;
            font-weight: 900;
            color: #FF6B00;
            text-shadow: 4px 4px 0 #FFD700;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 40px;
        }
        .controls-info {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            margin: 20px auto;
            max-width: 500px;
            border: 4px solid #FFD700;
        }
        .control-item {
            font-size: 1.2rem;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-color {
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 900;
        }
        .blue { background: #00D9FF; color: white; }
        .orange { background: #FF6B00; color: white; }
        .key {
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 900;
        }
        .start-btn {
            background: linear-gradient(135deg, #FFD700, #FF6B00);
            border: none;
            padding: 20px 60px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }

        /* ゲーム画面 */
        .game-container {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .game-container.active {
            display: block;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 3px solid #FFD700;
        }
        .timer {
            color: #FF6B00;
        }
        .score {
            color: #FFD700;
        }

        /* ゲームキャンバス */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 1000;
            border: 5px solid #FFD700;
        }
        .result-screen.active {
            display: block;
            animation: popIn 0.5s;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .result-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .success { color: #4CAF50; }
        .failed { color: #FF4444; }
        .result-stats {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #333;
        }
        .result-score {
            font-size: 5rem;
            font-weight: 900;
            color: #FFD700;
            margin: 20px 0;
        }

        /* メッセージ */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #000;
            pointer-events: none;
            z-index: 200;
            animation: messageFloat 2s ease-out forwards;
        }
        @keyframes messageFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -200%) scale(1.5); }
        }
    </style>
</head>
<body>
    <!-- スタート画面 -->
    <div class="start-screen" id="startScreen">
        <div class="title">🍋 キレートレモン輸出ダッシュ</div>
        <div class="subtitle">研究所と国際事業部で協力してレモンを輸出せよ！</div>
        <div class="controls-info">
            <div class="control-item">
                <span class="player-color blue">🔬 研究所</span>
                <div>
                    <span class="key">W</span> ジャンプ
                    <span class="key">A</span> <span class="key">D</span> 移動
                </div>
            </div>
            <div class="control-item">
                <span class="player-color orange">🌍 国際事業部</span>
                <div>
                    <span class="key">↑</span> ジャンプ
                    <span class="key">←</span> <span class="key">→</span> 移動
                </div>
            </div>
        </div>
        <br>
        <button class="start-btn" onclick="startGame()">ゲーム開始！</button>
    </div>

    <!-- ゲーム画面 -->
    <div class="game-container" id="gameContainer">
        <div class="hud">
            <div class="hud-item timer">⏱️ <span id="timer">30</span></div>
            <div class="hud-item score">🍋 <span id="score">0</span> / 10</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 結果画面 -->
    <div class="result-screen" id="resultScreen">
        <div class="result-title" id="resultTitle">🎉</div>
        <div class="result-score">🍋 <span id="resultScore">0</span></div>
        <div class="result-stats" id="resultStats"></div>
        <br>
        <button class="start-btn" onclick="restart()">もう一度！</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // キャンバスサイズ設定
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ゲーム状態
        const game = {
            running: false,
            time: 30,
            score: 0,
            target: 10,
            cameraX: 0,
            worldWidth: 5000,
            keys: {},
            gravity: 0.8,
            groundY: canvas.height - 100
        };

        // プレイヤー
        const players = {
            research: {
                x: 100,
                y: game.groundY - 60,
                width: 40,
                height: 60,
                velocityX: 0,
                velocityY: 0,
                speed: 5,
                jumpPower: -15,
                onGround: true,
                color: '#00D9FF',
                emoji: '🔬',
                keys: { left: 'a', right: 'd', jump: 'w' }
            },
            international: {
                x: 100,
                y: game.groundY - 60,
                width: 40,
                height: 60,
                velocityX: 0,
                velocityY: 0,
                speed: 5,
                jumpPower: -15,
                onGround: true,
                color: '#FF6B00',
                emoji: '🌍',
                keys: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp' }
            }
        };

        // レモン
        const lemons = [];
        const lemonSize = 30;

        // 障害物
        const obstacles = [];

        // プラットフォーム
        const platforms = [];

        // パーティクル
        const particles = [];

        // レベル生成
        function generateLevel() {
            lemons.length = 0;
            obstacles.length = 0;
            platforms.length = 0;

            // レモン配置
            for (let i = 0; i < game.target; i++) {
                lemons.push({
                    x: 300 + i * 400 + Math.random() * 200,
                    y: game.groundY - 100 - Math.random() * 200,
                    collected: false,
                    rotation: Math.random() * Math.PI * 2
                });
            }

            // プラットフォーム配置
            for (let i = 0; i < 15; i++) {
                platforms.push({
                    x: 400 + i * 300,
                    y: game.groundY - 150 - Math.random() * 150,
                    width: 120 + Math.random() * 100,
                    height: 20
                });
            }

            // 障害物配置（岩）
            for (let i = 0; i < 20; i++) {
                obstacles.push({
                    x: 500 + i * 200 + Math.random() * 100,
                    y: game.groundY - 40,
                    width: 40,
                    height: 40,
                    emoji: '🪨'
                });
            }

            // ゴール
            game.goalX = game.worldWidth - 300;
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            
            game.running = true;
            game.time = 30;
            game.score = 0;
            game.cameraX = 0;
            
            players.research.x = 100;
            players.research.y = game.groundY - 60;
            players.international.x = 150;
            players.international.y = game.groundY - 60;
            
            generateLevel();
            startTimer();
            gameLoop();
        }

        // タイマー
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!game.running) {
                    clearInterval(timerInterval);
                    return;
                }
                game.time--;
                document.getElementById('timer').textContent = game.time;
                
                if (game.time <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        // キー入力
        document.addEventListener('keydown', (e) => {
            game.keys[e.key.toLowerCase()] = true;
            
            // ジャンプ
            if (e.key.toLowerCase() === 'w' && players.research.onGround) {
                players.research.velocityY = players.research.jumpPower;
                players.research.onGround = false;
            }
            if (e.key === 'ArrowUp' && players.international.onGround) {
                players.international.velocityY = players.international.jumpPower;
                players.international.onGround = false;
            }
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key.toLowerCase()] = false;
        });

        // プレイヤー更新
        function updatePlayer(player) {
            // 横移動
            if (game.keys[player.keys.left]) {
                player.velocityX = -player.speed;
            } else if (game.keys[player.keys.right]) {
                player.velocityX = player.speed;
            } else {
                player.velocityX *= 0.8;
            }

            // 重力
            if (!player.onGround) {
                player.velocityY += game.gravity;
            }

            // 位置更新
            player.x += player.velocityX;
            player.y += player.velocityY;

            // 地面判定
            if (player.y >= game.groundY - player.height) {
                player.y = game.groundY - player.height;
                player.velocityY = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }

            // プラットフォーム判定
            platforms.forEach(platform => {
                if (player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height &&
                    player.velocityY >= 0) {
                    player.y = platform.y - player.height;
                    player.velocityY = 0;
                    player.onGround = true;
                }
            });

            // 画面端制限
            player.x = Math.max(0, Math.min(game.worldWidth - player.width, player.x));
        }

        // レモン収集判定
        function checkLemonCollection() {
            lemons.forEach(lemon => {
                if (lemon.collected) return;
                
                Object.values(players).forEach(player => {
                    const dx = (player.x + player.width / 2) - lemon.x;
                    const dy = (player.y + player.height / 2) - lemon.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < lemonSize) {
                        lemon.collected = true;
                        game.score++;
                        document.getElementById('score').textContent = game.score;
                        createParticles(lemon.x, lemon.y, '🍋');
                        
                        if (game.score >= game.target) {
                            showMessage('全部集めた！ゴールへ急げ！');
                        }
                    }
                });
            });
        }

        // 障害物衝突判定
        function checkObstacleCollision() {
            obstacles.forEach(obstacle => {
                Object.values(players).forEach(player => {
                    if (player.x + player.width > obstacle.x &&
                        player.x < obstacle.x + obstacle.width &&
                        player.y + player.height > obstacle.y &&
                        player.y < obstacle.y + obstacle.height) {
                        // 後ろに押し戻す
                        if (player.velocityX > 0) {
                            player.x = obstacle.x - player.width;
                        } else {
                            player.x = obstacle.x + obstacle.width;
                        }
                        player.velocityX = 0;
                    }
                });
            });
        }

        // ゴール判定
        function checkGoal() {
            if (game.score < game.target) return;
            
            const allAtGoal = Object.values(players).every(player => 
                player.x >= game.goalX
            );
            
            if (allAtGoal) {
                endGame(true);
            }
        }

        // パーティクル生成
        function createParticles(x, y, emoji) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 30,
                    emoji: emoji
                });
            }
        }

        // パーティクル更新
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // メッセージ表示
        function showMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        // カメラ更新
        function updateCamera() {
            const avgX = (players.research.x + players.international.x) / 2;
            game.cameraX = avgX - canvas.width / 2;
            game.cameraX = Math.max(0, Math.min(game.worldWidth - canvas.width, game.cameraX));
        }

        // 描画
        function draw() {
            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E0F6FF');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 雲
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 5; i++) {
                const x = (i * 400 - game.cameraX * 0.3) % canvas.width;
                ctx.beginPath();
                ctx.arc(x, 100 + i * 50, 40, 0, Math.PI * 2);
                ctx.arc(x + 30, 100 + i * 50, 50, 0, Math.PI * 2);
                ctx.arc(x + 60, 100 + i * 50, 40, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(-game.cameraX, 0);

            // 地面
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, game.groundY, game.worldWidth, canvas.height - game.groundY);
            
            // 草
            ctx.fillStyle = '#7CB342';
            ctx.fillRect(0, game.groundY - 10, game.worldWidth, 10);

            // プラットフォーム
            ctx.fillStyle = '#6D4C41';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                // 草
                ctx.fillStyle = '#7CB342';
                ctx.fillRect(platform.x, platform.y - 5, platform.width, 5);
                ctx.fillStyle = '#6D4C41';
            });

            // 障害物
            obstacles.forEach(obstacle => {
                ctx.font = '40px Arial';
                ctx.fillText(obstacle.emoji, obstacle.x, obstacle.y + obstacle.height);
            });

            // レモン
            lemons.forEach(lemon => {
                if (lemon.collected) return;
                lemon.rotation += 0.05;
                ctx.save();
                ctx.translate(lemon.x, lemon.y);
                ctx.rotate(lemon.rotation);
                ctx.font = `${lemonSize * 2}px Arial`;
                ctx.fillText('🍋', -lemonSize, lemonSize);
                ctx.restore();
            });

            // ゴール
            if (game.score >= game.target) {
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(game.goalX, game.groundY - 150, 100, 150);
                ctx.font = '60px Arial';
                ctx.fillText('🚢', game.goalX + 20, game.groundY - 60);
                ctx.fillStyle = '#FF6B00';
                ctx.font = 'bold 30px Arial';
                ctx.fillText('輸出港', game.goalX + 10, game.groundY - 160);
            }

            // プレイヤー
            Object.values(players).forEach(player => {
                // 影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(player.x + player.width / 2, game.groundY + 5, player.width / 2, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // 体
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                // 顔
                ctx.font = '40px Arial';
                ctx.fillText(player.emoji, player.x + 5, player.y + 35);
            });

            // パーティクル
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.font = '20px Arial';
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        // ゲームループ
        function gameLoop() {
            if (!game.running) return;

            updatePlayer(players.research);
            updatePlayer(players.international);
            checkLemonCollection();
            checkObstacleCollision();
            checkGoal();
            updateParticles();
            updateCamera();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // ゲーム終了
        function endGame(success) {
            game.running = false;
            
            const resultScreen = document.getElementById('resultScreen');
            const resultTitle = document.getElementById('resultTitle');
            const resultScore = document.getElementById('resultScore');
            const resultStats = document.getElementById('resultStats');
            
            if (success) {
                resultTitle.textContent = '🎉 輸出成功！';
                resultTitle.className = 'result-title success';
                resultStats.textContent = `残り時間: ${game.time}秒`;
            } else {
                resultTitle.textContent = '⏰ 時間切れ';
                resultTitle.className = 'result-title failed';
                resultStats.textContent = `${game.score}個 / ${game.target}個 収集`;
            }
            
            resultScore.textContent = game.score;
            resultScreen.classList.add('active');
        }

        // リスタート
        function restart() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            game.groundY = canvas.height - 100;
        });
    </script>
</body>
</html>
