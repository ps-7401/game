<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キレートレモン輸出シンク</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            position: relative;
        }

        /* 背景レモンアニメーション */
        .bg-lemon {
            position: fixed;
            font-size: 4rem;
            opacity: 0.05;
            animation: floatLemon 20s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes floatLemon {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -30px) rotate(90deg); }
            50% { transform: translate(-20px, 20px) rotate(180deg); }
            75% { transform: translate(40px, 10px) rotate(270deg); }
        }

        /* スタート画面 */
        .start-screen {
            text-align: center;
            animation: fadeIn 0.5s;
            max-width: 700px;
        }
        .start-screen.hidden {
            display: none;
        }
        .game-logo {
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 0.3em;
        }
        .game-title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            position: relative;
        }
        .title-lemon {
            font-size: 5rem;
            display: inline-block;
            animation: rotateLemon 3s infinite ease-in-out;
        }
        @keyframes rotateLemon {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .game-subtitle {
            font-size: 1.4rem;
            color: #FDD835;
            margin-bottom: 50px;
            letter-spacing: 0.2em;
            font-weight: 700;
        }
        .start-instructions {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin: 30px auto;
        }
        .instruction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dept-label {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .dept-icon {
            font-size: 2rem;
        }
        .lab {
            color: #00D9FF;
        }
        .intl {
            color: #FF6B00;
        }
        .key-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
            text-align: center;
        }
        .start-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            padding: 25px 70px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            color: #000;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .start-btn::before {
            content: '🍋';
            position: absolute;
            left: 20px;
            font-size: 2rem;
        }
        .start-btn::after {
            content: '🍋';
            position: absolute;
            right: 20px;
            font-size: 2rem;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        /* ゲーム画面 */
        .game-screen {
            display: none;
            width: 90vw;
            max-width: 1200px;
            height: 80vh;
            position: relative;
        }
        .game-screen.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        /* ヘッダー */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }
        .timer-display {
            font-size: 5rem;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .timer-display::before,
        .timer-display::after {
            content: '🍋';
            font-size: 3rem;
        }
        .timer-display.warning {
            color: #FF4444;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .score-display {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }
        .score-label {
            color: #888;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .score-number {
            font-size: 3.5rem;
            color: #FFD700;
            font-weight: 900;
        }

        /* メインゲームエリア */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            height: calc(100% - 150px);
        }

        /* 部門パネル */
        .dept-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            position: relative;
            overflow: hidden;
        }
        .dept-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, transparent, var(--dept-color), transparent);
        }
        .dept-panel.lab {
            --dept-color: #00D9FF;
        }
        .dept-panel.intl {
            --dept-color: #FF6B00;
        }
        .dept-panel.perfect {
            animation: perfectGlow 0.5s;
        }
        @keyframes perfectGlow {
            0%, 100% { box-shadow: none; }
            50% { 
                box-shadow: 0 0 50px var(--dept-color);
                border-color: var(--dept-color);
            }
        }

        .dept-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .dept-icon-large {
            font-size: 2.5rem;
        }

        /* レモンメーター */
        .meter-container {
            position: relative;
            height: 100px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            margin: 40px 0;
            overflow: hidden;
            border: 3px solid rgba(255, 215, 0, 0.2);
        }
        .meter-track {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
        }
        .zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.3s;
        }
        .zone.danger {
            background: rgba(100, 100, 100, 0.2);
        }
        .zone.good {
            background: rgba(255, 215, 0, 0.15);
        }
        .zone.perfect {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulseZone 1s infinite;
        }
        @keyframes pulseZone {
            0%, 100% { background: rgba(255, 215, 0, 0.3); }
            50% { background: rgba(255, 215, 0, 0.4); }
        }

        /* レモンインジケーター */
        .indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 50%;
            transform: translateY(-50%);
            transition: left 0.05s linear;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 20px var(--dept-color));
            z-index: 10;
        }

        /* ボタン */
        .action-btn {
            width: 100%;
            padding: 30px;
            font-size: 2.2rem;
            font-weight: 900;
            border: 4px solid var(--dept-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--dept-color);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            transition: all 0.1s;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
        }
        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--dept-color);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            opacity: 0.2;
        }
        .action-btn:active::before {
            width: 400px;
            height: 400px;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        .action-btn:active {
            transform: scale(0.98);
        }

        .status-text {
            text-align: center;
            font-size: 1.4rem;
            margin: 25px 0;
            min-height: 40px;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s;
            max-width: 700px;
            margin: 0 auto;
        }
        .result-screen.active {
            display: block;
        }
        .result-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #FFD700;
        }
        .result-lemon-count {
            font-size: 8rem;
            margin: 20px 0;
        }
        .final-score {
            font-size: 7rem;
            font-weight: 900;
            color: #FFD700;
            margin: 20px 0;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }
        .result-message {
            font-size: 1.8rem;
            color: #FDD835;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }
        .rank {
            display: inline-block;
            font-size: 2.5rem;
            padding: 25px 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            margin: 30px 0;
            border: 3px solid rgba(255, 215, 0, 0.4);
            font-weight: 900;
        }

        /* レモン飛び散りエフェクト */
        .lemon-splash {
            position: absolute;
            font-size: 3rem;
            pointer-events: none;
            animation: splash 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes splash {
            0% { 
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% { 
                transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg);
                opacity: 0;
            }
        }

        /* フィードバック */
        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            pointer-events: none;
            animation: feedbackPop 0.6s ease-out;
            z-index: 1000;
            text-shadow: 0 0 20px currentColor;
        }
        @keyframes feedbackPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .game-title { font-size: 2.5rem; }
            .timer-display { font-size: 3rem; }
            .game-area { grid-template-columns: 1fr; gap: 20px; }
            .dept-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <!-- 背景レモン -->
    <div class="bg-lemon" style="top: 10%; left: 10%; animation-delay: 0s;">🍋</div>
    <div class="bg-lemon" style="top: 20%; right: 15%; animation-delay: 2s;">🍋</div>
    <div class="bg-lemon" style="bottom: 15%; left: 20%; animation-delay: 4s;">🍋</div>
    <div class="bg-lemon" style="bottom: 25%; right: 10%; animation-delay: 6s;">🍋</div>
    <div class="bg-lemon" style="top: 50%; left: 5%; animation-delay: 8s;">🍋</div>
    <div class="bg-lemon" style="top: 60%; right: 5%; animation-delay: 10s;">🍋</div>

    <!-- スタート画面 -->
    <div class="start-screen" id="startScreen">
        <div class="game-logo">ポッカサッポロ presents</div>
        <div class="game-title">
            <span class="title-lemon">🍋</span>
            キレートレモン
            <span class="title-lemon">🍋</span>
        </div>
        <div class="game-subtitle">輸出シンクロゲーム</div>
        <div class="start-instructions">
            <div class="instruction-row">
                <span class="dept-label lab">
                    <span class="dept-icon">🔬</span>
                    <span>研究所</span>
                </span>
                <span class="key-display">スペース</span>
            </div>
            <div class="instruction-row">
                <span class="dept-label intl">
                    <span class="dept-icon">🌍</span>
                    <span>国際事業部</span>
                </span>
                <span class="key-display">エンター</span>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">ゲーム開始</button>
    </div>

    <!-- ゲーム画面 -->
    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <div class="score-display">
                <div class="score-label">🍋 輸出成功数</div>
                <div class="score-number" id="score">0</div>
            </div>
            <div class="timer-display" id="timer">10</div>
        </div>

        <div class="game-area">
            <!-- 研究所 -->
            <div class="dept-panel lab" id="labPanel">
                <div class="dept-title lab">
                    <span class="dept-icon-large">🔬</span>
                    <span>研究所</span>
                </div>
                <div class="status-text" id="labStatus">待機中...</div>
                <div class="meter-container">
                    <div class="meter-track">
                        <div class="zone danger">💧</div>
                        <div class="zone good">🍋</div>
                        <div class="zone perfect">✨🍋✨</div>
                        <div class="zone good">🍋</div>
                        <div class="zone danger">💧</div>
                    </div>
                    <div class="indicator" id="labIndicator" style="--dept-color: #00D9FF;">🍋</div>
                </div>
                <button class="action-btn" id="labBtn" style="--dept-color: #00D9FF;">品質チェック！</button>
            </div>

            <!-- 国際事業部 -->
            <div class="dept-panel intl" id="intlPanel">
                <div class="dept-title intl">
                    <span class="dept-icon-large">🌍</span>
                    <span>国際事業部</span>
                </div>
                <div class="status-text" id="intlStatus">待機中...</div>
                <div class="meter-container">
                    <div class="meter-track">
                        <div class="zone danger">📦</div>
                        <div class="zone good">🍋</div>
                        <div class="zone perfect">✨🍋✨</div>
                        <div class="zone good">🍋</div>
                        <div class="zone danger">📦</div>
                    </div>
                    <div class="indicator" id="intlIndicator" style="--dept-color: #FF6B00;">🍋</div>
                </div>
                <button class="action-btn" id="intlBtn" style="--dept-color: #FF6B00;">輸出実行！</button>
            </div>
        </div>
    </div>

    <!-- 結果画面 -->
    <div class="result-screen" id="resultScreen">
        <div class="result-title">🎉 ミッション完了 🎉</div>
        <div class="result-lemon-count" id="lemonCount">🍋</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="result-message">本のキレートレモンを輸出！</div>
        <div class="rank" id="rank">-</div>
        <br><br>
        <button class="start-btn" onclick="restart()">もう一度プレイ</button>
    </div>

    <script>
        const game = {
            time: 10,
            score: 0,
            running: false,
            lab: { position: 0, direction: 1, speed: 0.015, pressed: false },
            intl: { position: 0, direction: 1, speed: 0.012, pressed: false }
        };

        let animationFrame;
        let timerInterval;

        // スタート
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('active');
            
            game.time = 10;
            game.score = 0;
            game.running = true;
            game.lab = { position: 0, direction: 1, speed: 0.015, pressed: false };
            game.intl = { position: 0, direction: 1, speed: 0.012, pressed: false };
            
            updateDisplay();
            startTimer();
            animate();
            setupControls();
        }

        // タイマー
        function startTimer() {
            timerInterval = setInterval(() => {
                game.time--;
                const timerEl = document.getElementById('timer');
                timerEl.textContent = game.time;
                
                if (game.time <= 3) {
                    timerEl.classList.add('warning');
                }
                
                if (game.time <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // アニメーション
        function animate() {
            if (!game.running) return;

            // 研究所のインジケーター
            game.lab.position += game.lab.speed * game.lab.direction;
            if (game.lab.position >= 1 || game.lab.position <= 0) {
                game.lab.direction *= -1;
            }

            // 国際事業部のインジケーター
            game.intl.position += game.intl.speed * game.intl.direction;
            if (game.intl.position >= 1 || game.intl.position <= 0) {
                game.intl.direction *= -1;
            }

            updateIndicators();
            animationFrame = requestAnimationFrame(animate);
        }

        function updateIndicators() {
            const labIndicator = document.getElementById('labIndicator');
            const intlIndicator = document.getElementById('intlIndicator');
            
            labIndicator.style.left = `calc(${game.lab.position * 100}% - 30px)`;
            intlIndicator.style.left = `calc(${game.intl.position * 100}% - 30px)`;
        }

        // コントロール
        function setupControls() {
            document.addEventListener('keydown', handleKeyPress);
            document.getElementById('labBtn').onclick = () => pressButton('lab');
            document.getElementById('intlBtn').onclick = () => pressButton('intl');
        }

        function handleKeyPress(e) {
            if (!game.running) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                pressButton('lab');
            } else if (e.code === 'Enter') {
                e.preventDefault();
                pressButton('intl');
            }
        }

        function pressButton(dept) {
            if (game[dept].pressed) return;
            
            game[dept].pressed = true;
            const zone = getZone(game[dept].position);
            
            // ステータス更新
            const statusEl = document.getElementById(dept + 'Status');
            if (zone === 'perfect') {
                statusEl.textContent = '⭐ パーフェクト！';
                statusEl.style.color = '#FFD700';
            } else if (zone === 'good') {
                statusEl.textContent = '✓ グッド！';
                statusEl.style.color = '#FFA500';
            } else {
                statusEl.textContent = '✗ ミス...';
                statusEl.style.color = '#FF4444';
            }

            // 両方押されたかチェック
            checkSync();
        }

        function getZone(position) {
            if (position >= 0.4 && position <= 0.6) return 'perfect';
            if (position >= 0.2 && position <= 0.8) return 'good';
            return 'danger';
        }

        function checkSync() {
            if (!game.lab.pressed || !game.intl.pressed) return;

            const labZone = getZone(game.lab.position);
            const intlZone = getZone(game.intl.position);

            let feedback = '';

            // 両方 PERFECT
            if (labZone === 'perfect' && intlZone === 'perfect') {
                game.score += 3;
                feedback = '🌟 完璧なシンクロ！ +3';
                document.getElementById('labPanel').classList.add('perfect');
                document.getElementById('intlPanel').classList.add('perfect');
                createLemonSplash(10);
                setTimeout(() => {
                    document.getElementById('labPanel').classList.remove('perfect');
                    document.getElementById('intlPanel').classList.remove('perfect');
                }, 500);
            }
            // どちらかPERFECT、もう片方GOOD
            else if ((labZone === 'perfect' || intlZone === 'perfect') && 
                     (labZone === 'good' || intlZone === 'good')) {
                game.score += 2;
                feedback = '✨ 素晴らしい！ +2';
                createLemonSplash(5);
            }
            // 両方GOOD
            else if (labZone === 'good' && intlZone === 'good') {
                game.score += 1;
                feedback = '✓ 成功！ +1';
                createLemonSplash(3);
            }
            // 失敗
            else {
                feedback = '✗ 失敗...';
            }

            showFeedback(feedback);
            updateDisplay();

            // リセット
            setTimeout(() => {
                game.lab.pressed = false;
                game.intl.pressed = false;
                document.getElementById('labStatus').textContent = '待機中...';
                document.getElementById('intlStatus').textContent = '待機中...';
                document.getElementById('labStatus').style.color = '';
                document.getElementById('intlStatus').style.color = '';
            }, 800);
        }

        function createLemonSplash(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const splash = document.createElement('div');
                    splash.className = 'lemon-splash';
                    splash.textContent = '🍋';
                    splash.style.left = '50%';
                    splash.style.top = '50%';
                    
                    const angle = (Math.PI * 2 * i) / count;
                    const distance = 150;
                    splash.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    splash.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    
                    document.getElementById('gameScreen').appendChild(splash);
                    setTimeout(() => splash.remove(), 1000);
                }, i * 50);
            }
        }

        function showFeedback(text) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.textContent = text;
            
            if (text.includes('完璧')) {
                feedback.style.color = '#FFD700';
            } else if (text.includes('素晴らしい') || text.includes('成功')) {
                feedback.style.color = '#FFA500';
            } else {
                feedback.style.color = '#FF4444';
            }
            
            document.getElementById('gameScreen').appendChild(feedback);
            setTimeout(() => feedback.remove(), 600);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = game.score;
        }

        // ゲーム終了
        function endGame() {
            game.running = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animationFrame);
            document.removeEventListener('keydown', handleKeyPress);

            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            
            // レモンの数を表示
            let lemonDisplay = '';
            for (let i = 0; i < Math.min(game.score, 10); i++) {
                lemonDisplay += '🍋';
            }
            if (game.score > 10) {
                lemonDisplay += `×${game.score}`;
            }
            document.getElementById('lemonCount').textContent = lemonDisplay;
            document.getElementById('finalScore').textContent = game.score;

            // ランク判定
            let rank = '';
            if (game.score >= 20) rank = 'S ランク - 輸出のプロ！';
            else if (game.score >= 15) rank = 'A ランク - エクセレント！';
            else if (game.score >= 10) rank = 'B ランク - グッド！';
            else if (game.score >= 5) rank = 'C ランク - もう少し！';
            else rank = 'D ランク - 練習あるのみ！';

            document.getElementById('rank').textContent = rank;
        }

        function restart() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('timer').classList.remove('warning');
        }
    </script>
</body>
</html>
